<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Card Silhouette Prototype</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        /* The final game card container */
        #game-card {
            width: 280px;
            height: 400px;
            border: 4px solid #ff007f;
            border-radius: 16px;
            background: linear-gradient(135deg, #120c1f, #1f1137);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
            overflow: hidden;
            position: relative;
        }
        /* Canvas fits perfectly inside the card */
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        button {
            margin-top: 20px;
            padding: 12px 24px;
            background: #ff007f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-card">
        <!-- The live processed frame renders here -->
        <canvas id="outputCanvas" width="280" height="400"></canvas>
    </div>

    <!-- Hidden video element to hold raw camera stream stream -->
    <video id="webcam" playsinline autoplay muted style="display:none;"></video>

    <button id="startButton">Start Audition</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');

        startButton.addEventListener('click', async () => {
            try {
                // 1. Request mobile phone camera access
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 480, height: 640 }, 
                    audio: false 
                });
                video.srcObject = stream;
                startButton.style.display = 'none'; // Hide button once started
                
                // 2. Start the processing loop once video data loads
                video.addEventListener('loadeddata', () => {
                    requestAnimationFrame(processFrame);
                });
            } catch (err) {
                alert('Camera access denied or unsupported: ' + err.message);
            }
        });

        function processFrame() {
            if (video.paused || video.ended) return;

            // Clear canvas and draw a flashy card background grid/graphic
            ctx.fillStyle = '#1f1137';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw a decorative glowing circle behind where the silhouette will go
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 80, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
            ctx.fill();

            // 3. Draw raw video frame onto canvas centered
            // We scale it down slightly to act as an inner layer
            const imgWidth = canvas.width;
            const imgHeight = (video.videoHeight / video.videoWidth) * imgWidth;
            const yOffset = (canvas.height - imgHeight) / 2;
            
            ctx.drawImage(video, 0, yOffset, imgWidth, imgHeight);

            // 4. Pixel manipulation: Isolate the person into a flat silhouette
            // This grabs every single RGBA value currently drawn on the canvas
            const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const l = frame.data.length;

            for (let i = 0; i < l; i += 4) {
                let r = frame.data[i];
                let g = frame.data[i + 1];
                let b = frame.data[i + 2];

                // Simple Chroma-Key / Contrast Filter: 
                // If the pixel is mostly dark background, make it transparent.
                // If it's a lighter object/person, paint it a solid neon teal silhouette.
                if (r < 100 && g < 100 && b < 100) { 
                    // Make background blend away
                    frame.data[i + 3] = 100; 
                } else {
                    // Turn user pixels into solid neon teal silhouette [0, 255, 200]
                    frame.data[i] = 0;     // Red
                    frame.data[i + 1] = 255; // Green
                    frame.data[i + 2] = 200; // Blue
                    frame.data[i + 3] = 255; // Fully visible Alpha
                }
            }

            // Paint the modified pixel array back down onto the canvas card
            ctx.putImageData(frame, 0, 0);

            // Keep the loop cycling every screen refresh frame
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
