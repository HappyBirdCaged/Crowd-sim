<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Card Audition</title>
    <style>
        body { 
            background: #111; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        #game-card { 
            width: 280px; 
            height: 400px; 
            border: 4px solid #ff007f; 
            border-radius: 16px; 
            background: linear-gradient(135deg, #120c1f, #1f1137); 
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5); 
            overflow: hidden; 
            position: relative; 
        }
        #outputCanvas { 
            width: 100%; 
            height: 100%; 
            display: block; 
            object-fit: cover;
        }
        #startButton { 
            margin-top: 20px; 
            padding: 15px 30px; 
            background: #ff007f; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-card">
        <canvas id="outputCanvas" width="280" height="400"></canvas>
    </div>

    <!-- Hidden video element -->
    <video id="webcam" playsinline autoplay muted style="display:none;"></video>
    <button id="startButton">Start Audition</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');

        let backgroundFrame = null; 
        const THRESHOLD = 60; // Adjust this if background isn't cutting out cleanly

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 480, height: 640 }, 
                    audio: false 
                });
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
            } catch (err) {
                console.error("Camera error:", err);
                alert('Please allow camera access to continue.');
            }
        }

        function captureBackground() {
            // Draw current video to a temp canvas to capture the "empty" background
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, 0, 0, canvas.width, canvas.height);
            backgroundFrame = tempCtx.getImageData(0, 0, canvas.width, canvas.height).data;
        }

        function processFrame() {
            if (!backgroundFrame) return;

            // Draw video to canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = frame.data;

            // Subtract background
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i + 1], b = data[i + 2];
                const br = backgroundFrame[i], bg = backgroundFrame[i + 1], bb = backgroundFrame[i + 2];
                
                // Euclidean distance check
                const diff = Math.sqrt((r - br)**2 + (g - bg)**2 + (b - bb)**2);
                
                if (diff < THRESHOLD) {
                    data[i + 3] = 0; // Make transparent
                }
            }
            
            ctx.putImageData(frame, 0, 0);
            requestAnimationFrame(processFrame);
        }

        startButton.addEventListener('click', async () => {
            startButton.innerText = "Calibrating...";
            await initCamera();
            
            // Give user 1 second to step out of frame for calibration
            setTimeout(() => {
                captureBackground();
                startButton.style.display = 'none';
                processFrame();
            }, 1000);
        });
    </script>
</body>
</html>
