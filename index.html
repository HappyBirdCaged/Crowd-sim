<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dance Card Audition</title>
    <!-- Load MediaPipe Selfie Segmentation -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-card { width: 280px; height: 400px; border: 4px solid #ff007f; border-radius: 16px; overflow: hidden; background: #000; position: relative; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        #startButton { margin-top: 20px; padding: 15px 30px; background: #ff007f; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-card">
        <canvas id="outputCanvas" width="280" height="400"></canvas>
    </div>
    <video id="webcam" playsinline style="display:none;"></video>
    <button id="startButton">Start Audition</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw the mask: Only keep the person (the "humanoid")
            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
            
            // Set composite to only draw where the mask exists
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            
            ctx.restore();
        }

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
        }});
        selfieSegmentation.setOptions({modelSelection: 0});
        selfieSegmentation.onResults(onResults);

        startButton.addEventListener('click', async () => {
            startButton.style.display = 'none';
            const camera = new Camera(video, {
                onFrame: async () => {
                    await selfieSegmentation.send({image: video});
                },
                width: 480,
                height: 640
            });
            camera.start();
        });
    </script>
</body>
</html>
