<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dance Card Audition</title>
    <!-- Load MediaPipe Selfie Segmentation -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-card { width: 280px; height: 400px; border: 4px solid #ff007f; border-radius: 16px; overflow: hidden; background: #000; position: relative; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        #startButton { margin-top: 20px; padding: 15px 30px; background: #ff007f; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        #startButton:hover { background: #ff3399; }
    </style>
</head>
<body>

    <div id="game-card">
        <canvas id="outputCanvas" width="280" height="400"></canvas>
    </div>
    <video id="webcam" playsinline style="display:none;"></video>
    <button id="startButton">Start Audition</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');

        function onResults(results) {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw the video frame
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            
            // Draw the segmentation mask (this creates the "green screen" effect)
            // Using 'destination-in' to keep only the person and remove background
            ctx.globalCompositeOperation = 'destination-in';
            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
            
            // Reset composite operation
            ctx.globalCompositeOperation = 'source-over';
        }

        const selfieSegmentation = new SelfieSegmentation({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
            }
        });
        
        selfieSegmentation.setOptions({
            modelSelection: 0, // 0 = general model, 1 = landscape model
        });
        
        selfieSegmentation.onResults(onResults);

        startButton.addEventListener('click', async () => {
            startButton.style.display = 'none';
            
            const camera = new Camera(video, {
                onFrame: async () => {
                    try {
                        await selfieSegmentation.send({image: video});
                    } catch (error) {
                        console.error('Error processing frame:', error);
                    }
                },
                width: 280,
                height: 400
            });
            
            try {
                await camera.start();
                console.log('Camera started successfully');
            } catch (error) {
                console.error('Error starting camera:', error);
                startButton.style.display = 'block';
                alert('Failed to start camera. Please ensure you have granted camera permissions.');
            }
        });
    </script>
</body>
</html>
